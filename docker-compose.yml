version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: majistyle-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: majistyle_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: majistyle-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: infrastructure/docker/backend.Dockerfile
    container_name: majistyle-backend
    ports:
      - "3002:3002"
    environment:
      DATABASE_URL: postgresql://postgres:password123@postgres:5432/majistyle_db?schema=public
      REDIS_URL: redis://redis:6379
      PORT: 3002
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "npx prisma db push --accept-data-loss && npx ts-node prisma/seed.ts && npm run start:prod"


  frontend:
    build:
      context: .
      dockerfile: infrastructure/docker/frontend.Dockerfile
    container_name: majistyle-frontend
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
    depends_on:
      - backend

  admin:
    build:
      context: .
      dockerfile: infrastructure/docker/admin.Dockerfile
    container_name: majistyle-admin
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: majistyle-nginx
    ports:
      - "80:80"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - admin
      - backend

volumes:
  postgres_data:
  redis_data:
